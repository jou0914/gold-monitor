<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 金價動態監控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', 'PingFang TC', sans-serif; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 min-h-screen p-4 md:p-8">
    <div class="max-w-md mx-auto space-y-6">
        
        <header class="flex justify-between items-center px-2 py-4">
            <div>
                <h1 class="text-2xl font-black text-slate-900">Gold <span class="text-amber-500">Tracker</span></h1>
                <p id="status" class="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">Initialising...</p>
            </div>
            <div class="text-right">
                <p id="current-date" class="text-[10px] font-bold text-slate-400">2026.03.27.1</p>
                <p id="last-update" class="text-[10px] font-medium text-slate-300">--:--:--</p>
            </div>
        </header>

        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-50 text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-amber-50 rounded-full -mr-16 -mt-16 opacity-50"></div>
            <p id="price-label" class="text-[11px] font-black text-amber-600 uppercase tracking-widest mb-3">台銀基準 (自動偵測中)</p>
            <div class="flex items-baseline justify-center space-x-2">
                <input type="number" id="bot-real-price" value="4668" 
                       class="w-full text-6xl font-[900] text-slate-900 bg-transparent border-none focus:ring-0 p-0 outline-none tracking-tighter text-center transition-all">
                <span class="text-slate-300 font-bold text-xl uppercase">TWD</span>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mt-6">
                <button onclick="window.open('https://www.wantgoo.com/global/gold', '_blank')" 
                        class="flex items-center justify-center bg-red-500 text-white px-4 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-red-600 active:scale-95 transition-all shadow-md">
                    <span>玩股網對照</span>
                </button>
                <button onclick="window.open('https://rate.bot.com.tw/gold?Lang=zh-TW', '_blank')" 
                        class="flex items-center justify-center bg-blue-600 text-white px-4 py-4 rounded-2xl text-[10px] font-black uppercase hover:bg-blue-700 active:scale-95 transition-all shadow-md">
                    <span>台銀官網對照</span>
                </button>
            </div>

            <button onclick="autoFetchBOT()" class="mt-4 flex items-center justify-center space-x-2 bg-slate-900 text-white px-6 py-4 rounded-2xl text-[11px] font-black uppercase hover:bg-amber-500 active:scale-95 transition-all w-full shadow-lg">
                <svg id="sync-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <span id="btn-text">重新同步數據</span>
            </button>
            <p id="fetch-msg" class="text-[9px] text-slate-400 mt-3 italic font-bold uppercase">正在判斷營業時間...</p>
        </div>

        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-50">
            <div class="grid grid-cols-4 gap-3 mb-8 text-center">
                <div><p class="text-[10px] font-black text-slate-400 mb-2">兩</p><input type="number" id="unit-liang" placeholder="0" class="w-full bg-slate-50 rounded-2xl py-4 text-center font-black text-lg border-none focus:ring-2 focus:ring-amber-200 outline-none"></div>
                <div><p class="text-[10px] font-black text-slate-400 mb-2">錢</p><input type="number" id="unit-qian" placeholder="0" class="w-full bg-slate-50 rounded-2xl py-4 text-center font-black text-lg border-none focus:ring-2 focus:ring-amber-200 outline-none"></div>
                <div><p class="text-[10px] font-black text-slate-400 mb-2">分</p><input type="number" id="unit-fen" placeholder="0" class="w-full bg-slate-50 rounded-2xl py-4 text-center font-black text-lg border-none focus:ring-2 focus:ring-amber-200 outline-none"></div>
                <div><p class="text-[10px] font-black text-amber-500 mb-2">厘</p><input type="number" id="unit-li" placeholder="0" class="w-full bg-amber-50 rounded-2xl py-4 text-center font-black text-lg border-none text-amber-600 focus:ring-2 focus:ring-amber-200 outline-none"></div>
            </div>

            <div class="space-y-2 mb-8 text-center">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">實際成交總價 (TWD)</p>
                <input type="number" id="total-price" placeholder="輸入成交價" class="w-full bg-slate-900 text-white rounded-[1.5rem] py-5 text-center text-3xl font-black outline-none shadow-xl">
            </div>

            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-[2rem] p-6 text-white text-center shadow-xl relative overflow-hidden">
                <p class="text-[10px] font-bold opacity-70 mb-1 uppercase tracking-widest">換算每克單價</p>
                <span id="result-per-g" class="text-5xl font-[900] tracking-tighter">---</span>
                <div id="diff-tag" class="mt-4 mx-auto w-fit bg-white/20 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest backdrop-blur-sm">等待數據</div>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] overflow-hidden shadow-sm border border-slate-50 text-[13px]">
            <table class="w-full text-left">
                <tbody id="specs-body" class="divide-y divide-slate-50"></tbody>
            </table>
        </div>
    </div>

    <script>
        const fmt = new Intl.NumberFormat('zh-TW', { maximumFractionDigits: 1 });

        async function autoFetchBOT() {
            const statusEl = document.getElementById('status');
            const botInput = document.getElementById('bot-real-price');
            const syncIcon = document.getElementById('sync-icon');
            const msgEl = document.getElementById('fetch-msg');
            const labelEl = document.getElementById('price-label');
            
            statusEl.innerText = "Syncing...";
            syncIcon.classList.add('animate-spin');

            // 判斷是否為下午 5 點後 (17:00)
            const now = new Date();
            const hour = now.getHours();
            const isAfterFive = hour >= 17;
            const targetKeyword = isAfterFive ? '1公克' : '100公克';
            
            labelEl.innerText = isAfterFive ? "台銀基準 (1g 盤後報價)" : "台銀基準 (100g 營業牌價)";

            try {
                const targetUrl = "https://rate.bot.com.tw/gold?Lang=zh-TW";
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}&t=${Date.now()}`;
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Proxy error");
                const data = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                let foundPrice = null;
                const rows = doc.querySelectorAll('tr');
                rows.forEach(row => {
                    // 根據目前時間鎖定關鍵字
                    if (row.innerText.includes(targetKeyword)) {
                        const priceCells = row.querySelectorAll('.text-right');
                        if (priceCells.length > 0) {
                            const rawText = priceCells[0].innerText.replace(/,/g, '').trim();
                            foundPrice = parseFloat(rawText);
                        }
                    }
                });

                if (foundPrice && foundPrice > 1000) {
                    // 如果是下午 5 點前，抓到的是 100g 價格，要除以 100
                    const finalPrice = isAfterFive ? foundPrice : (foundPrice / 100);
                    botInput.value = finalPrice.toFixed(1);
                    
                    msgEl.innerText = isAfterFive 
                        ? `✅ 已同步台銀 1g 價格: NT$ ${fmt.format(foundPrice)}` 
                        : `✅ 已同步台銀 100g: NT$ ${fmt.format(foundPrice)}`;
                    
                    statusEl.innerText = "Online";
                } else {
                    throw new Error("Price row not found");
                }
            } catch (err) {
                console.error(err);
                statusEl.innerText = "Manual Mode";
                msgEl.innerText = "❌ 讀取失敗，為您開啟對照網頁...";
                window.open("https://www.wantgoo.com/global/gold", "_blank");
            } finally {
                syncIcon.classList.remove('animate-spin');
                document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
                document.getElementById('current-date').innerText = new Date().toLocaleDateString('zh-TW').replace(/\//g, '.');
                calculateAll();
            }
        }

        function calculateAll() {
            const botPrice = parseFloat(document.getElementById('bot-real-price').value) || 0;
            const liang = parseFloat(document.getElementById('unit-liang').value) || 0;
            const qian = parseFloat(document.getElementById('unit-qian').value) || 0;
            const fen = parseFloat(document.getElementById('unit-fen').value) || 0;
            const li = parseFloat(document.getElementById('unit-li').value) || 0;
            const totalPrice = parseFloat(document.getElementById('total-price').value) || 0;

            const resultEl = document.getElementById('result-per-g');
            const diffTag = document.getElementById('diff-tag');
            const tableBody = document.getElementById('specs-body');

            const totalQian = (liang * 10) + qian + (fen * 0.1) + (li * 0.01);
            const totalGrams = totalQian * 3.75;

            if (totalGrams > 0 && totalPrice > 0) {
                const pricePerG = totalPrice / totalGrams;
                resultEl.innerText = fmt.format(pricePerG);

                if (botPrice > 0) {
                    const diffPercent = ((pricePerG - botPrice) / botPrice) * 100;
                    diffTag.innerText = diffPercent > 0 ? `比基準貴 ${diffPercent.toFixed(1)}%` : `比基準便宜 ${Math.abs(diffPercent).toFixed(1)}%`;
                    diffTag.className = `mt-4 mx-auto w-fit px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest ${diffPercent > 0 ? 'bg-red-500/20 text-red-700' : 'bg-green-500/20 text-green-700'}`;
                }
            } else {
                resultEl.innerText = "---";
                diffTag.innerText = "等待輸入數據";
                diffTag.className = "mt-4 mx-auto w-fit bg-slate-100 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest";
            }

            const specs = [{ name: "5g 台銀條塊", w: 5 }, { name: "1 兩 (37.5g)", w: 37.5 }, { name: "1 盎司 (1oz)", w: 31.1035 }];
            tableBody.innerHTML = "";
            specs.forEach(s => {
                tableBody.innerHTML += `<tr><td class="p-6 text-center font-black text-slate-500 uppercase tracking-widest">${s.name}</td><td class="p-6 text-right text-slate-900 font-black text-lg">NT$ ${fmt.format(botPrice * s.w)}</td></tr>`;
            });
        }

        ['bot-real-price', 'unit-liang', 'unit-qian', 'unit-fen', 'unit-li', 'total-price'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateAll);
        });

        window.onload = autoFetchBOT;
    </script>
</body>
</html>
