<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 實體金價換算器</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-50 text-stone-800 min-h-screen p-4 font-sans pb-20">
    <div class="max-w-md mx-auto space-y-6">
        
        <header class="text-center py-6">
            <h1 class="text-2xl font-black text-stone-900 tracking-tight">💰 2026 台銀實體金價監控</h1>
            <p class="text-[10px] text-stone-400 mt-2 uppercase tracking-widest font-bold">現正對比：實體牌價基準</p>
        </header>

        <div class="bg-white border border-stone-200 rounded-[2.5rem] p-7 shadow-sm text-center">
            <p class="text-[11px] font-bold text-orange-600 uppercase mb-3 tracking-widest">請輸入今日台銀實體賣出價 (每克)</p>
            <div class="flex items-center justify-center space-x-2 mb-2">
                <input type="number" id="bot-real-price" value="4606" class="w-2/3 text-5xl font-black bg-stone-100 rounded-2xl p-4 text-center focus:ring-2 focus:ring-orange-500 outline-none text-stone-900">
                <span class="font-bold text-stone-400 text-xl">元</span>
            </div>
            <p class="text-[9px] text-stone-400 italic">※ 以台銀官網「黃金牌價/賣出」為準</p>
        </div>

        <div class="bg-white border border-stone-200 rounded-[2.5rem] p-7 shadow-sm text-center">
            <h3 class="font-bold text-stone-900 text-sm mb-5">⚖️ 實體重量轉克數換算</h3>
            
            <div class="grid grid-cols-4 gap-2 mb-6">
                <div>
                    <p class="text-[10px] font-bold text-stone-400 mb-1">兩</p>
                    <input type="number" id="unit-liang" placeholder="0" class="w-full bg-stone-50 rounded-xl p-3 text-center font-bold focus:bg-white border border-transparent focus:border-stone-200 outline-none">
                </div>
                <div>
                    <p class="text-[10px] font-bold text-stone-400 mb-1">錢</p>
                    <input type="number" id="unit-qian" placeholder="0" class="w-full bg-stone-50 rounded-xl p-3 text-center font-bold focus:bg-white border border-transparent focus:border-stone-200 outline-none">
                </div>
                <div>
                    <p class="text-[10px] font-bold text-stone-400 mb-1">分</p>
                    <input type="number" id="unit-fen" placeholder="0" class="w-full bg-stone-50 rounded-xl p-3 text-center font-bold focus:bg-white border border-transparent focus:border-stone-200 outline-none">
                </div>
                <div>
                    <p class="text-[10px] font-bold text-orange-500 mb-1 font-black">厘</p>
                    <input type="number" id="unit-li" placeholder="0" class="w-full bg-orange-50 rounded-xl p-3 text-center font-black border border-orange-100 focus:bg-white outline-none">
                </div>
            </div>

            <div class="mb-6">
                <p class="text-[10px] font-bold text-stone-400 mb-1 uppercase tracking-widest">成交總價 (TWD)</p>
                <input type="number" id="total-price" placeholder="輸入成交總金額" class="w-full bg-stone-900 text-white rounded-2xl p-5 text-center text-3xl font-black focus:ring-4 focus:ring-orange-500 outline-none shadow-xl">
            </div>

            <div class="bg-white border-2 border-dashed border-stone-200 rounded-3xl p-6 relative">
                <p class="text-[10px] text-stone-400 font-bold uppercase mb-1">換算結果 (每克單價)</p>
                <span id="result-per-g" class="text-4xl font-black text-stone-900">---</span>
                <div id="diff-tag" class="mt-3 inline-block px-4 py-1 rounded-full text-[10px] font-bold bg-stone-100 text-stone-500 uppercase tracking-widest">
                    等待數據輸入
                </div>
            </div>
        </div>

        <div class="bg-stone-900 rounded-[2.5rem] overflow-hidden shadow-2xl">
            <table class="w-full text-left text-sm text-stone-300">
                <thead class="bg-stone-800 text-stone-500 border-b border-stone-700">
                    <tr>
                        <th class="p-5 font-bold uppercase text-[10px] text-center">規格</th>
                        <th class="p-5 text-right font-bold text-orange-400 uppercase text-[10px]">預估價格</th>
                    </tr>
                </thead>
                <tbody id="specs-body" class="divide-y divide-stone-800 font-bold">
                    </tbody>
            </table>
        </div>

    </div>

    <script>
        const fmt = new Intl.NumberFormat('zh-TW', { maximumFractionDigits: 0 });

        function calculateAll() {
            const botPrice = parseFloat(document.getElementById('bot-real-price').value) || 0;
            const liang = parseFloat(document.getElementById('unit-liang').value) || 0;
            const qian = parseFloat(document.getElementById('unit-qian').value) || 0;
            const fen = parseFloat(document.getElementById('unit-fen').value) || 0;
            const li = parseFloat(document.getElementById('unit-li').value) || 0;
            const totalPrice = parseFloat(document.getElementById('total-price').value) || 0;

            const resultEl = document.getElementById('result-per-g');
            const diffTag = document.getElementById('diff-tag');
            const tableBody = document.getElementById('specs-body');

            // 1. 換算總克數 (1 兩=10錢, 1錢=10分=100厘, 1錢=3.75g)
            const totalQian = (liang * 10) + qian + (fen * 0.1) + (li * 0.01);
            const totalGrams = totalQian * 3.75;

            // 2. 算單價與溢價
            if (totalGrams > 0 && totalPrice > 0) {
                const pricePerG = totalPrice / totalGrams;
                resultEl.innerText = fmt.format(pricePerG);

                if (botPrice > 0) {
                    const diffPercent = ((pricePerG - botPrice) / botPrice) * 100;
                    const diffText = diffPercent > 0 ? `比台銀貴 ${diffPercent.toFixed(1)}%` : `比台銀便宜 ${Math.abs(diffPercent).toFixed(1)}%`;
                    diffTag.innerText = diffText;
                    diffTag.className = `mt-3 inline-block px-4 py-1 rounded-full text-[10px] font-bold ${diffPercent > 0 ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`;
                }
            } else {
                resultEl.innerText = "---";
                diffTag.innerText = "等待重量與總價";
                diffTag.className = "mt-3 inline-block px-4 py-1 rounded-full text-[10px] font-bold bg-stone-100 text-stone-500";
            }

            // 3. 更新規格表 (基於 4606)
            const specs = [
                { name: "5公克 (台銀條塊)", w: 5 },
                { name: "1兩 (10錢)", w: 37.5 },
                { name: "5錢金條", w: 18.75 }
            ];
            
            tableBody.innerHTML = "";
            specs.forEach(s => {
                tableBody.innerHTML += `
                    <tr>
                        <td class="p-5 text-center text-[10px] uppercase tracking-widest font-bold">${s.name}</td>
                        <td class="p-5 text-right text-orange-400 font-black text-lg">NT$ ${fmt.format(botPrice * s.w)}</td>
                    </tr>
                `;
            });
        }

        // 監聽所有輸入
        ['bot-real-price', 'unit-liang', 'unit-qian', 'unit-fen', 'unit-li', 'total-price'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateAll);
        });

        // 初始執行一次
        calculateAll();
    </script>
</body>
</html>
