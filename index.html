<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 金價監控 (國際現貨換算版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', 'PingFang TC', sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* 自定義金價數字漸層 */
        .gold-text-gradient {
            background: linear-gradient(135deg, #BF953F 0%, #FCF6BA 45%, #B38728 70%, #AA771C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 輸入框聚焦時的柔和光暈 */
        input:focus {
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
            border-color: #10B981 !important;
        }
        
        /* 移除輸入框的小箭頭 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body class="bg-[#F1F5F9] text-slate-800 min-h-screen p-4 md:p-8">
    <div class="max-w-md mx-auto space-y-8">
        
        <header class="flex justify-between items-center px-2">
            <div>
                <h1 class="text-3xl font-black text-slate-950 tracking-tighter">Gold <span class="text-green-600 font-extrabold text-2xl">XAU/TWD</span></h1>
                <div class="flex items-center gap-2 mt-1.5">
                    <span id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></span>
                    <p id="status" class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Initialising...</p>
                </div>
            </div>
            <div class="text-right bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-100">
                <p id="current-date" class="text-[11px] font-bold text-slate-600">2026.03.27</p>
                <p id="last-update" class="text-[11px] font-medium text-slate-400">--:--:--</p>
            </div>
        </header>

        <div class="bg-white rounded-[3rem] p-8 shadow-lg shadow-green-950/5 border border-slate-50 text-center relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-40 h-40 bg-yellow-100 rounded-full opacity-60 blur-2xl"></div>
            <div class="absolute -bottom-10 -left-10 w-40 h-40 bg-green-50 rounded-full opacity-80 blur-2xl"></div>
            
            <div class="relative z-10">
                <p class="text-[12px] font-black text-green-700 uppercase tracking-widest mb-4">即時國際盤換算基準 (每公克)</p>
                
                <div class="flex items-baseline justify-center gap-2 bg-slate-50 rounded-full py-4 px-6 border border-slate-100 w-fit mx-auto shadow-inner">
                    <input type="number" id="bot-real-price" value="0" step="0.1"
                           class="w-40 text-6xl font-[900] text-slate-900 bg-transparent border-none focus:ring-0 p-0 outline-none tracking-tighter text-center transition-all hover:text-green-600">
                    <span class="text-slate-400 font-bold text-xl uppercase tracking-wider">TWD</span>
                </div>
                
                <div class="grid grid-cols-2 gap-3 mt-8">
                    <button onclick="window.open('https://wealth.esunbank.com/zh-tw/gold/price/current-price?dev=mobile', '_blank')" 
                            class="bg-slate-100 text-slate-700 hover:bg-slate-200 px-4 py-4 rounded-2xl text-[11px] font-bold uppercase transition-all flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        <span>玉山官網</span>
                    </button>
                    <button onclick="autoFetchGoldPrice()" class="bg-green-600 text-white px-4 py-4 rounded-2xl text-[11px] font-black uppercase shadow-md shadow-green-500/20 hover:bg-green-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <svg id="sync-icon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        <span>更新現貨金價</span>
                    </button>
                </div>
                
                <p id="fetch-msg" class="text-[10px] text-slate-400 mt-4 italic font-medium uppercase tracking-wide">來源：國際現貨金價 API 換算</p>
            </div>
        </div>

        <div class="bg-white rounded-[3rem] p-8 shadow-lg shadow-slate-950/5 border border-slate-50">
            <p class="text-[12px] font-black text-slate-500 uppercase tracking-widest text-center mb-5">持有重量 (台制)</p>
            <div class="grid grid-cols-4 gap-4 mb-10 text-center">
                <div class="bg-slate-50 p-2 rounded-2xl border border-slate-100">
                    <p class="text-[11px] font-black text-slate-400 mb-2">兩</p>
                    <input type="number" id="unit-liang" placeholder="0" class="w-full bg-white rounded-xl py-4 text-center text-2xl font-black border border-slate-100 outline-none transition-all focus:border-green-300 focus:ring-2 focus:ring-green-100">
                </div>
                <div class="bg-slate-50 p-2 rounded-2xl border border-slate-100">
                    <p class="text-[11px] font-black text-slate-400 mb-2">錢</p>
                    <input type="number" id="unit-qian" placeholder="0" class="w-full bg-white rounded-xl py-4 text-center text-2xl font-black border border-slate-100 outline-none transition-all focus:border-green-300 focus:ring-2 focus:ring-green-100">
                </div>
                <div class="bg-slate-50 p-2 rounded-2xl border border-slate-100">
                    <p class="text-[11px] font-black text-slate-400 mb-2">分</p>
                    <input type="number" id="unit-fen" placeholder="0" class="w-full bg-white rounded-xl py-4 text-center text-2xl font-black border border-slate-100 outline-none transition-all focus:border-green-300 focus:ring-2 focus:ring-green-100">
                </div>
                <div class="bg-green-50 p-2 rounded-2xl border border-green-100">
                    <p class="text-[11px] font-black text-green-600 mb-2">厘</p>
                    <input type="number" id="unit-li" placeholder="0" class="w-full bg-white rounded-xl py-4 text-center text-2xl font-black border border-green-100 text-green-700 outline-none transition-all focus:border-green-300 focus:ring-2 focus:ring-green-100">
                </div>
            </div>

            <div class="space-y-3 mb-10 text-center">
                <p class="text-[12px] font-black text-slate-500 uppercase tracking-widest">實際成交總價 (TWD)</p>
                <input type="number" id="total-price" placeholder="輸入成交金額" 
                       class="w-full bg-slate-950 text-white rounded-[2rem] py-6 text-center text-4xl font-black outline-none shadow-xl shadow-slate-950/10 transition-all focus:ring-4 focus:ring-green-500/30 border-4 border-transparent focus:border-green-400/50">
            </div>

            <div class="bg-gradient-to-br from-slate-800 to-slate-950 rounded-[2.5rem] p-8 text-white text-center shadow-2xl shadow-slate-950/20 relative overflow-hidden border border-slate-700">
                <svg class="absolute inset-0 w-full h-full opacity-10" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
                    <defs><pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse"><path d="M 20 0 L 0 0 0 20" fill="none" stroke="white" stroke-width="0.5"/></pattern></defs>
                    <rect width="100%" height="100%" fill="url(#grid)" />
                </svg>
                
                <div class="relative z-10">
                    <p class="text-[12px] font-bold opacity-70 mb-2 uppercase tracking-widest">換算每克單價</p>
                    <span id="result-per-g" class="text-6xl font-[900] tracking-tighter gold-text-gradient">---</span>
                    <div id="diff-tag" class="mt-5 mx-auto w-fit bg-white/10 px-5 py-2 rounded-full text-[11px] font-black uppercase tracking-widest backdrop-blur-sm border border-white/10 text-slate-300">等待數據</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-4">
            <p class="text-[12px] font-black text-slate-500 uppercase tracking-widest text-center">基準價換算參考</p>
            
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="specs-list">
                </div>
        </div>

        <footer class="text-center pb-8 pt-4">
            <p class="text-[10px] text-slate-400 font-medium">Gold Monitor v2.0 | 2026 Internal Tool</p>
        </footer>
    </div>

    <script>
        const fmt = new Intl.NumberFormat('zh-TW', { maximumFractionDigits: 1 });
        const fmtMoney = new Intl.NumberFormat('zh-TW', { style: 'currency', currency: 'TWD', minimumFractionDigits: 0, maximumFractionDigits: 0 });

        // 核心修改：切換為穩定不卡 CORS 的公開 API 組合
        async function autoFetchGoldPrice() {
            const statusEl = document.getElementById('status');
            const statusDot = document.getElementById('status-dot');
            const botInput = document.getElementById('bot-real-price');
            const msgEl = document.getElementById('fetch-msg');
            const syncIcon = document.getElementById('sync-icon');
            const now = new Date();
            
            statusEl.innerText = "Syncing...";
            statusDot.className = "w-2 h-2 rounded-full bg-yellow-400 animate-pulse";
            syncIcon.classList.add('animate-spin');

            try {
                // 1. 抓取國際金價 (XAU/USD, 單位: 盎司)
                // 這個 API 支援瀏覽器直接呼叫，無 CORS 問題
                const goldRes = await fetch("https://api.gold-api.com/price/XAU");
                if (!goldRes.ok) throw new Error("Gold API error");
                const goldData = await goldRes.json();
                const pricePerOunceUSD = goldData.price;

                // 2. 抓取即時美金匯率 (USD/TWD)
                const rateRes = await fetch("https://open.er-api.com/v6/latest/USD");
                if (!rateRes.ok) throw new Error("Rate API error");
                const rateData = await rateRes.json();
                const usdToTwd = rateData.rates.TWD;

                if (!pricePerOunceUSD || !usdToTwd) throw new Error("Data invalid");

                // 3. 換算公式：(美金金價 / 31.1035 盎司轉克) * 美金匯率
                const pricePerGramTWD = (pricePerOunceUSD / 31.1035) * usdToTwd;

                botInput.value = pricePerGramTWD.toFixed(1);
                msgEl.innerText = `✅ 同步成功: $${pricePerOunceUSD} oz / 匯率 ${usdToTwd.toFixed(2)}`;
                statusEl.innerText = "Online (Live)";
                statusDot.className = "w-2 h-2 rounded-full bg-green-500";

            } catch (err) {
                console.error(err);
                msgEl.innerText = "❌ 抓取失敗 (CORS 或網路問題)，請手動輸入";
                statusEl.innerText = "Manual Mode";
                statusDot.className = "w-2 h-2 rounded-full bg-red-500";
                
                // 失敗時給個合理的 2026 預估保底價
                if(parseFloat(botInput.value) === 0) botInput.value = "4800.0";
            } finally {
                syncIcon.classList.remove('animate-spin');
                document.getElementById('last-update').innerText = now.toLocaleTimeString();
                document.getElementById('current-date').innerText = now.toLocaleDateString('zh-TW').replace(/\//g, '.');
                calculateAll();
            }
        }

        function calculateAll() {
            const botPrice = parseFloat(document.getElementById('bot-real-price').value) || 0;
            const liang = parseFloat(document.getElementById('unit-liang').value) || 0;
            const qian = parseFloat(document.getElementById('unit-qian').value) || 0;
            const fen = parseFloat(document.getElementById('unit-fen').value) || 0;
            const li = parseFloat(document.getElementById('unit-li').value) || 0;
            const totalPrice = parseFloat(document.getElementById('total-price').value) || 0;

            const resultEl = document.getElementById('result-per-g');
            const diffTag = document.getElementById('diff-tag');
            const specsList = document.getElementById('specs-list');

            const totalQian = (liang * 10) + qian + (fen * 0.1) + (li * 0.01);
            const totalGrams = totalQian * 3.75;

            // 計算平均單價與差異
            if (totalGrams > 0 && totalPrice > 0) {
                const pricePerG = totalPrice / totalGrams;
                resultEl.innerText = fmt.format(pricePerG);

                if (botPrice > 0) {
                    const diffPercent = ((pricePerG - botPrice) / botPrice) * 100;
                    const isExpensive = diffPercent > 0;
                    diffTag.innerText = `${isExpensive ? '⚠️ 貴' : '👍 便宜'} ${Math.abs(diffPercent).toFixed(1)}%`;
                    diffTag.className = `mt-5 mx-auto w-fit px-5 py-2 rounded-full text-[11px] font-black uppercase tracking-widest backdrop-blur-sm border ${isExpensive ? 'bg-red-500/20 text-red-300 border-red-500/30' : 'bg-green-500/20 text-green-300 border-green-500/30'}`;
                }
            } else {
                resultEl.innerText = "---";
                diffTag.innerText = "等待輸入數據";
                diffTag.className = "mt-5 mx-auto w-fit bg-white/10 px-5 py-2 rounded-full text-[11px] font-black uppercase tracking-widest backdrop-blur-sm border border-white/10 text-slate-300";
            }

            // 渲染下方參考列表 (優化美觀性)
            const specs = [
                { name: "台兩", w: 37.5, unit: "37.5g", icon: "⚖️" }, 
                { name: "台錢", w: 3.75, unit: "3.75g", icon: "💰" }, 
                { name: "金衡盎司", w: 31.1035, unit: "1oz", icon: "🌎" }
            ];
            
            specsList.innerHTML = "";
            specs.forEach(s => {
                const price = botPrice * s.w;
                specsList.innerHTML += `
                    <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm transition-all hover:shadow-md hover:-translate-y-0.5">
                        <div class="flex items-center gap-3 mb-3">
                            <span class="text-2xl">${s.icon}</span>
                            <div>
                                <p class="text-sm font-bold text-slate-950">1 ${s.name}</p>
                                <p class="text-[11px] font-medium text-slate-400">${s.unit}</p>
                            </div>
                        </div>
                        <p class="text-2xl font-black text-green-700 tracking-tight">${fmtMoney.format(price)}</p>
                    </div>
                `;
            });
        }

        // 監聽所有輸入框
        ['bot-real-price', 'unit-liang', 'unit-qian', 'unit-fen', 'unit-li', 'total-price'].forEach(id => {
            document.getElementById(id).addEventListener('input', calculateAll);
        });

        // 頁面載入時自動抓取
        window.onload = autoFetchGoldPrice;
    </script>
</body>
</html>
